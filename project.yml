name: Calcium
options:
  bundleIdPrefix: com.romanpodymov
  deploymentTarget:
    iOS: 15.0
  xcodeVersion: "15.4"
targets:
  CalciumApp:
    type: application
    platform: iOS
    sources: [Calcium]
    info:
      path: Calcium/Info.plist
    postCompileScripts:
      - script: "mint run swiftformat . --swiftversion 5.9"
        name: SwiftFormat
      - script: "mint run swiftlint"
        name: SwiftLint
  CalciumAppTests:
    type: bundle.unit-test
    platform: iOS
    sources: [CalciumTests]
    dependencies:
      - target: CalciumApp
    info:
      path: CalciumTests/Info.plist
    postCompileScripts:
      - script: "mint run swiftformat . --swiftversion 5.9"
        name: SwiftFormat
      - script: "mint run swiftlint"
        name: SwiftLint
